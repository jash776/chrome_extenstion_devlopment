name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - staging
      - release
      - dev
  pull_request:
    branches:
      - master
      - staging
      - release
      - dev

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Lint JavaScript/TypeScript files
        run: |
          if [ -f package.json ]; then
            npm run lint --if-present
          else
            echo "No package.json found, skipping lint"
          fi

  validate-manifest:
    name: Validate Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manifest.json exists and is valid JSON
        run: |
          if [ -f manifest.json ]; then
            echo "Found manifest.json — validating..."
            python3 -c "
          import json, sys
          with open('manifest.json') as f:
              data = json.load(f)
          required = ['manifest_version', 'name', 'version']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'ERROR: manifest.json is missing required fields: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'manifest.json is valid (manifest_version={data[\"manifest_version\"]}, name={data[\"name\"]}, version={data[\"version\"]})')
          "
          else
            echo "No manifest.json found yet — skipping validation"
          fi

  package:
    name: Package Extension
    runs-on: ubuntu-latest
    needs: [lint, validate-manifest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build extension (if build script exists)
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build --if-present
          else
            echo "No package.json found, skipping build step"
          fi

      - name: Package extension as ZIP
        run: |
          mkdir -p dist
          zip -r dist/chrome-extension.zip . \
            --exclude "*.git*" \
            --exclude "dist/*" \
            --exclude "node_modules/*" \
            --exclude ".github/*" \
            --exclude "*.zip"
          echo "Extension packaged: $(du -sh dist/chrome-extension.zip)"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/chrome-extension.zip
          retention-days: 30
